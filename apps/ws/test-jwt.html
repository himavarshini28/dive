<!DOCTYPE html>
<html>
<head>
    <title>WebSocket JWT Test</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        #log { border: 1px solid #ccc; padding: 10px; height: 400px; overflow-y: auto; margin-top: 10px; background: #f9f9f9; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        input { padding: 8px; width: 300px; margin: 5px; }
    </style>
</head>
<body>
    <h1>🧪 WebSocket JWT Test</h1>
    
    <h2>Step 1: Get JWT Token</h2>
    <div>
        <input type="text" id="username" placeholder="Username (min 3 chars)" value="testuser">
        <input type="password" id="password" placeholder="Password (min 3 chars)" value="testpass">
        <button onclick="getJWTToken()">Get JWT Token</button>
    </div>
    <div style="margin-top: 10px;">
        <strong>JWT Token:</strong><br>
        <textarea id="token" style="width: 100%; height: 60px;" readonly></textarea>
    </div>
    
    <h2>Step 2: Connect to WebSocket</h2>
    <div>
        <button onclick="connectWebSocket()">Connect to WebSocket</button>
        <button onclick="sendMessage()">Send Test Message</button>
        <button onclick="disconnect()">Disconnect</button>
    </div>
    
    <h2>Logs</h2>
    <div id="log"></div>

    <script>
        let ws = null;
        let jwtToken = null;

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const className = type;
            logDiv.innerHTML += `<div class="${className}">[${time}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function getJWTToken() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username.length < 3 || password.length < 3) {
                log('❌ Username and password must be at least 3 characters', 'error');
                return;
            }

            log('📡 Requesting JWT token from HTTP server...', 'info');
            
            try {
                const response = await fetch('http://localhost:3001/auth/signin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                jwtToken = await response.text();
                document.getElementById('token').value = jwtToken;
                log('✅ JWT Token received successfully!', 'success');
                log('Token preview: ' + jwtToken.substring(0, 50) + '...', 'info');
            } catch (error) {
                log('❌ Failed to get JWT token: ' + error.message, 'error');
                log('Make sure HTTP server is running on port 3001', 'error');
            }
        }

        function connectWebSocket() {
            const token = document.getElementById('token').value;
            
            if (!token) {
                log('❌ Please get JWT token first (Step 1)', 'error');
                return;
            }

            const url = `ws://localhost:8080?token=${token}`;
            log('🔌 Connecting to: ws://localhost:8080', 'info');
            
            try {
                ws = new WebSocket(url);
                
                ws.onopen = () => {
                    log('✅ WebSocket connection opened!', 'success');
                };
                
                ws.onmessage = (event) => {
                    log('📩 Received from server: ' + event.data, 'success');
                };
                
                ws.onerror = (error) => {
                    log('❌ WebSocket error occurred', 'error');
                    console.error('WebSocket error:', error);
                };
                
                ws.onclose = (event) => {
                    log(`🔌 Connection closed (Code: ${event.code}, Reason: ${event.reason || 'No reason provided'})`, 'error');
                    if (event.code === 1006) {
                        log('This usually means the server rejected the connection (bad JWT?)', 'error');
                    }
                };
            } catch (error) {
                log('❌ Failed to create WebSocket: ' + error.message, 'error');
            }
        }

        function sendMessage() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('❌ Not connected to WebSocket. Connect first!', 'error');
                return;
            }
            
            const message = 'Hello from test client at ' + new Date().toLocaleTimeString();
            ws.send(message);
            log('📤 Sent: ' + message, 'info');
        }

        function disconnect() {
            if (ws) {
                ws.close();
                log('Disconnecting...', 'info');
            } else {
                log('No active connection', 'error');
            }
        }
    </script>
</body>
</html>
